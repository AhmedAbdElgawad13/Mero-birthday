<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For MERNA ❤️</title>

<style>
body{     text-align: center;
    font-family: Arial;
    background: linear-gradient(to top, #ffe6f0, #ffffff);
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    color: #ff4d88;
    font-size: 35px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #e6005c;
}

#message {
    display: none;
    margin-top: 25px;
    font-size: 22px;
    color: #333;
    line-height: 1.8;
}

/* hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-900px);}
}
</style>

</head>

<body>

<h1>🎉 Happy Birthday 7bibty❤️</h1>
<button onclick="showMessage()">Click here Ya 7bibty❤️</button>

<div id="message">
   ❤️ كل سنة وانتي طيبة يا حبيبتي <br>
    سنة سعيدة عليكي وإن شاء الله تحققي كل اللي بتتمنيه 💫<br>
    ويارب دايماً أشوفك ناجحة ومبسوطة <br>
   ❤️ وربنا يخليكي ليا يا قلبي <br>
    HBD Ya 7bibty❤️<br>❤️بحبك❤️<br>
<img src="merna.jpg.jpg" width="150" style="border-radius:15px; margin-top:20px;">


</div>
    


<script>
function showMessage() {
    document.getElementById("message").style.display = "block";

    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }, 250);
}
</script>

</body>
</html>
